<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Cadet Pinball</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    #gameContainer {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
    #minResWarning {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #000;
      color: #fff;
      font-family: monospace;
      font-size: 16px;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="900" height="900"></canvas>
  </div>
  <div id="minResWarning">
    <p>Minimum resolution: 600px width required.<br>Please resize your browser window.</p>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
